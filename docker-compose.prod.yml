services:
  user-db:
    ports: !reset []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: petwell_user

  pet-db:
    ports: !reset []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: petwell_pet

  ehr-db:
    ports: !reset []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: petwell_ehr

  appointment-db:
    ports: !reset []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: petwell_appointment

  telemed-db:
    ports: !reset []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: petwell_telemed

  notification-db:
    ports: !reset []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: petwell_notification

  billing-db:
    ports: !reset []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: petwell_billing

  analytics-db:
    ports: !reset []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: petwell_analytics

  redis:
    ports: !reset []

  rabbitmq:
    ports: !reset []
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?set RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS}

  mailpit:
    ports: !reset []

  minio:
    ports: !reset []
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}

  minio-init:
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:?set MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}; do sleep 2; done &&
      mc mb -p local/${MINIO_BUCKET:-petwell-assets} || true &&
      mc anonymous set download local/${MINIO_BUCKET:-petwell-assets} || true
      "

  api-gateway:
    environment:
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:?set RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS}@rabbitmq:5672

  user-service:
    environment:
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@user-db:5432/petwell_user
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:?set RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:?set PUBLIC_APP_URL}
      MAIL_FROM: ${MAIL_FROM:?set MAIL_FROM}

  pet-service:
    environment:
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@pet-db:5432/petwell_pet
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:?set RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS}@rabbitmq:5672

  ehr-service:
    environment:
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@ehr-db:5432/petwell_ehr
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:?set RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:?set FIELD_ENCRYPTION_KEY}

  appointment-service:
    environment:
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@appointment-db:5432/petwell_appointment
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:?set RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS}@rabbitmq:5672

  billing-service:
    environment:
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@billing-db:5432/petwell_billing
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:?set RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      PAYMENT_CURRENCY: ${PAYMENT_CURRENCY:-COP}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:?set PUBLIC_APP_URL}
      API_PUBLIC_URL: ${API_PUBLIC_URL:?set API_PUBLIC_URL}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-petwell-assets}
      WOMPI_SANDBOX_PUBLIC_KEY: ${WOMPI_SANDBOX_PUBLIC_KEY:-}
      WOMPI_SANDBOX_PRIVATE_KEY: ${WOMPI_SANDBOX_PRIVATE_KEY:-}
      WOMPI_SANDBOX_INTEGRITY_SECRET: ${WOMPI_SANDBOX_INTEGRITY_SECRET:-}
      WOMPI_SANDBOX_EVENTS_SECRET: ${WOMPI_SANDBOX_EVENTS_SECRET:-}
      WOMPI_PRODUCTION_PUBLIC_KEY: ${WOMPI_PRODUCTION_PUBLIC_KEY:-}
      WOMPI_PRODUCTION_PRIVATE_KEY: ${WOMPI_PRODUCTION_PRIVATE_KEY:-}
      WOMPI_PRODUCTION_INTEGRITY_SECRET: ${WOMPI_PRODUCTION_INTEGRITY_SECRET:-}
      WOMPI_PRODUCTION_EVENTS_SECRET: ${WOMPI_PRODUCTION_EVENTS_SECRET:-}
      MERCADOPAGO_SANDBOX_ACCESS_TOKEN: ${MERCADOPAGO_SANDBOX_ACCESS_TOKEN:-}
      MERCADOPAGO_SANDBOX_WEBHOOK_SECRET: ${MERCADOPAGO_SANDBOX_WEBHOOK_SECRET:-}
      MERCADOPAGO_PRODUCTION_ACCESS_TOKEN: ${MERCADOPAGO_PRODUCTION_ACCESS_TOKEN:-}
      MERCADOPAGO_PRODUCTION_WEBHOOK_SECRET: ${MERCADOPAGO_PRODUCTION_WEBHOOK_SECRET:-}

  telemed-service:
    environment:
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@telemed-db:5432/petwell_telemed
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:?set RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:?set PUBLIC_APP_URL}
      TELEMED_PROVIDER: ${TELEMED_PROVIDER:-mock}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_API_KEY: ${TWILIO_API_KEY:-}
      TWILIO_API_SECRET: ${TWILIO_API_SECRET:-}
      DAILY_API_KEY: ${DAILY_API_KEY:-}

  notification-service:
    environment:
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@notification-db:5432/petwell_notification
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:?set RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      MAIL_HOST: ${MAIL_HOST:?set MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:?set MAIL_PORT}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:?set MAIL_FROM}

  analytics-service:
    environment:
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@analytics-db:5432/petwell_analytics
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:?set RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS}@rabbitmq:5672

  frontend-public-web:
    build:
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}

  frontend-admin-web:
    build:
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}

  nginx:
    ports:
      - "${HTTP_PORT:-80}:80"

  prometheus:
    ports: !override
      - "${PROMETHEUS_PORT:-127.0.0.1:9090}:9090"

  loki:
    ports: !override
      - "${LOKI_PORT:-127.0.0.1:3100}:3100"

  grafana:
    ports: !override
      - "${GRAFANA_PORT:-127.0.0.1:3009}:3000"
